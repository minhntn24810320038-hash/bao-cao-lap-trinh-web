<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <title>Áo Nam | T.M.H Menswear</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="ao.css" />
  </head>

  <body>
    <header class="navbar">
      <a href="index.html" class="logo"> T.M.H </a>

      <nav class="menu">
        <a href="index.html"> Trang chủ </a>

        <a href="#"> Áo nam </a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>BỘ SƯU TẬP ÁO NAM</h1>

        <p>Tinh giản trong thiết kế - Tinh tế trong từng chi tiết</p>
      </div>
    </section>

    <main class="container">
      <h2 class="section-title">ÁO NAM NỔI BẬT</h2>

      <div class="products-grid">
        <div class="product-card">
          <div class="product-image">
            <img src="anh-san-pham/san pham ao/so-mi1.png" alt="" />
          </div>

          <div class="product-info">
            <p class="tag">SƠ MI</p>

            <h3>Sơ mi cao cấp</h3>

            <p class="price">799.000 đ</p>

            <button>Thêm vào giỏ</button>
          </div>
        </div>

        <div class="product-card">
          <div class="product-image">
            <img src="anh-san-pham/san pham ao/so-mi2.png" alt="" />
          </div>

          <div class="product-info">
            <p class="tag">SƠ MI</p>

            <h3>Sơ mi công sở</h3>

            <p class="price">350.000 đ</p>

            <button>Thêm vào giỏ</button>
          </div>
        </div>

        <div class="product-card">
          <div class="product-image">
            <img src="anh-san-pham/san pham ao/anh-nen.png" alt="" />
          </div>

          <div class="product-info">
            <p class="tag">ÁO THUN</p>

            <h3>Áo tối giản</h3>

            <p class="price">299.000 đ</p>

            <button>Thêm vào giỏ</button>
          </div>
        </div>
      </div>
    </main>

    <footer>© 2026 T.M.H Menswear</footer>

</html>
